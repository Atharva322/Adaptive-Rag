databases:
  # PostgreSQL Database (Free Tier - 256MB)
  - name: adaptive-rag-db
    plan: free
    databaseName: adaptive_rag
    user: adaptive_rag_user

services:
  # FastAPI Backend
  - type: web
    name: adaptive-rag-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: OPENAI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: adaptive-rag-db
          property: connectionString

  # Streamlit Frontend
  - type: web
    name: adaptive-rag-frontend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run streamlit_app/app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: BACKEND_URL
        fromService:
          type: web
          name: adaptive-rag-backend
          property: host